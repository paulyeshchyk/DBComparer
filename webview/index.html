<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Compare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>DB Schema Compare</h1>

  <!-- Вкладки -->
  <div class="tabs">
    <div class="tab-headers">
      <div class="tab-header active" data-tab="settings">Настройки</div>
      <div class="tab-header" data-tab="result">Результат</div>
    </div>
    <div class="tab-contents">
      <!-- Вкладка "Настройки" -->
      <div id="tab-settings" class="tab-content active">
        <div class="section">
          <label><strong>Source:</strong></label><br>
          <input id="source" type="text" placeholder="Server=10.63.5.195;Database=..." value="{{lastSource}}" class="connection"><br><br>
          
          <label><strong>Target:</strong></label><br>
          <input id="target" type="text" placeholder="Server=... или postgresql://..." value="{{lastTarget}}" class="connection"><br><br>

          <label><input type="checkbox" id="normalizeTypes" checked> Нормализовать типы</label><br>
          <label><input type="checkbox" id="normalizeSchemaEnabled" checked> Нормализовать схемы</label><br>
          <label><input type="checkbox" id="ignoreCase" checked> Игнорировать регистр</label><br>
          <label><input type="checkbox" id="useCache" checked> Кешировать результат</label><br><br>

          <label><strong>Маппинг схем:</strong></label><br>
          <div id="mappingContainer">
            <table id="mappingTable">
              <thead>
                <tr><th>Исходная схема</th><th>Целевая схема</th><th></th></tr>
              </thead>
              <tbody id="mappingBody">
                <!-- Строки будут добавлены скриптом -->
              </tbody>
            </table>
            <button id="addMappingRow" type="button">+ Добавить строку</button>
          </div>
          <br>

          <label><strong>Режим отображения:</strong></label><br>
          <input type="radio" name="viewMode" value="detailed" checked> Детальный<br>
          <input type="radio" name="viewMode" value="grouped"> Группировка по типам<br><br>

          <button id="runBtn" onclick="startCompare()">▶ Запустить сравнение</button>
        </div>
      </div>

      <!-- Вкладка "Результат" -->
      <div id="tab-result" class="tab-content">
        <div id="result"></div>
      </div>
    </div>
  </div>

  <!-- Область статуса -->
  <div id="status" class="section"></div>

  <script src="script.js"></script>
</body>
</html>
